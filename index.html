<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Color Cipher</title>
    <style>
        :root {
            --secret-color: #67a2df; /* Your specific color */
            --cursor-x: 50%;
            --cursor-y: 50%;
        }

        body {
            margin: 0;
            background: #000;
            color: #000; /* Text is black, matching background */
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        /* The Typing Area */
        #editor {
            position: absolute;
            top: 50px;
            left: 50px;
            right: 50px;
            bottom: 50px;
            background: transparent;
            color: var(--secret-color);
            border: none;
            outline: none;
            font-size: 1.2rem;
            resize: none;
            z-index: 1;
            /* The key: mix-blend-mode */
            /* It stays invisible on black, but reacts to the light layer */
            mix-blend-mode: color-dodge; 
        }

        /* The "Light Source" */
        .flashlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(
                circle 150px at var(--cursor-x) var(--cursor-y),
                var(--secret-color) 0%,
                #000 100%
            );
        }

        .ui-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #333;
            font-size: 0.8rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="flashlight"></div>
    <textarea id="editor" placeholder="Type your secrets here... they will vanish into the dark."></textarea>
    
    <div class="ui-hint">Move your cursor to reveal. Content is saved locally.</div>

    <script>
        const editor = document.getElementById('editor');
        const root = document.documentElement;

        // Load saved content
        editor.value = localStorage.getItem('secret_note') || "";

        // Save content on type
        editor.addEventListener('input', () => {
            localStorage.setItem('secret_note', editor.value);
        });

        // Track Mouse/Touch
        const update = (e) => {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            if (x && y) {
                root.style.setProperty('--cursor-x', x + 'px');
                root.style.setProperty('--cursor-y', y + 'px');
            }
        };

        window.addEventListener('mousemove', update);
        window.addEventListener('touchmove', update);
    </script>
</body>
</html>
